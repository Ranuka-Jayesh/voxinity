<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-labelledby="t d">
  <title id="t">Voxinity</title>
  <desc id="d">Video dubbing and translation monorepo banner</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.35"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24"/>
    </filter>
  </defs>
  <rect width="920" height="260" rx="16" fill="url(#bg)"/>
  <rect width="920" height="260" rx="16" fill="url(#grid)"/>
  <ellipse cx="760" cy="40" rx="140" ry="80" fill="#38bdf8" opacity="0.12" filter="url(#blur)"/>
  <ellipse cx="180" cy="200" rx="120" ry="70" fill="#a78bfa" opacity="0.1" filter="url(#blur)"/>
  <text x="460" y="108" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" letter-spacing="-0.04em">Voxinity</text>
  <text x="460" y="148" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="17" font-weight="500">Video dubbing · translation · ML pipeline</text>
  <text x="460" y="176" text-anchor="middle" fill="#64748b" font-family="ui-monospace,Menlo,monospace" font-size="13">React · Vite · TypeScript · FastAPI · Python · FFmpeg</text>
  <rect x="310" y="198" width="300" height="5" rx="3" fill="url(#glow)" opacity="0.95"/>
  <rect x="310" y="218" width="140" height="4" rx="2" fill="#334155" opacity="0.9"/>
  <rect x="470" y="218" width="140" height="4" rx="2" fill="#334155" opacity="0.55"/>
</svg>
