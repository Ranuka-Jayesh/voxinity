name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm run test

      - name: Vite production build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  backend-syntax:
    name: Backend (Python syntax)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Byte-compile backend (no ML deps)
        run: python -m compileall -q backend

  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs: [frontend, backend-syntax]
    if: always()
    steps:
      - name: Require all jobs
        env:
          FRONTEND: ${{ needs.frontend.result }}
          BACKEND: ${{ needs.backend-syntax.result }}
        run: |
          echo "frontend=$FRONTEND backend=$BACKEND"
          test "$FRONTEND" = "success" && test "$BACKEND" = "success"
