# Optional: validates Docker image (PyTorch + TTS — long build, high CPU/RAM).
# Run manually from Actions tab, or uncomment `schedule` for weekly smoke.

name: Docker API image

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 6 * * 1"   # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Dockerfile.api (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          load: true
          tags: voxinity-api:ci
